name: Deploy Web (Hostinger)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_FEED_MOCK: "0"
      EXPO_PUBLIC_GTM_ID: "GTM-TNHK5MSV"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required env vars and Asaas secrets
        env:
          ASAAS_API_KEY: ${{ secrets.ASAAS_API_KEY }}
          ASAAS_BASE_URL: ${{ secrets.ASAAS_BASE_URL }}
          ASAAS_WEBHOOK_TOKEN: ${{ secrets.ASAAS_WEBHOOK_TOKEN }}
          ASAAS_ENABLE_CHECKOUT_CALLBACK: ${{ secrets.ASAAS_ENABLE_CHECKOUT_CALLBACK }}
          ASAAS_CHECKOUT_SUCCESS_URL: ${{ secrets.ASAAS_CHECKOUT_SUCCESS_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_ENCRYPTION: ${{ secrets.SMTP_ENCRYPTION }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::Missing EXPO_PUBLIC_SUPABASE_URL (GitHub Secret)."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing EXPO_PUBLIC_SUPABASE_ANON_KEY (GitHub Secret)."
            exit 1
          fi
          if [[ "$EXPO_PUBLIC_SUPABASE_ANON_KEY" != sb_publishable_* ]]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_ANON_KEY inválida. Use a chave publishable (sb_publishable_...)."
            exit 1
          fi
          if [ -z "$ASAAS_API_KEY" ]; then
            echo "::error::Missing ASAAS_API_KEY (GitHub Secret)."
            exit 1
          fi
          if [ -z "$ASAAS_BASE_URL" ]; then
            echo "::error::Missing ASAAS_BASE_URL (GitHub Secret)."
            exit 1
          fi
          if [ -z "$ASAAS_WEBHOOK_TOKEN" ]; then
            echo "::error::Missing ASAAS_WEBHOOK_TOKEN (GitHub Secret)."
            exit 1
          fi
          if [ -z "$ASAAS_ENABLE_CHECKOUT_CALLBACK" ]; then
            echo "::error::Missing ASAAS_ENABLE_CHECKOUT_CALLBACK (GitHub Secret)."
            exit 1
          fi
          if [ -z "$ASAAS_CHECKOUT_SUCCESS_URL" ]; then
            echo "::error::Missing ASAAS_CHECKOUT_SUCCESS_URL (GitHub Secret)."
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Missing OPENAI_API_KEY (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_HOST" ]; then
            echo "::error::Missing SMTP_HOST (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_PORT" ]; then
            echo "::error::Missing SMTP_PORT (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_ENCRYPTION" ]; then
            echo "::error::Missing SMTP_ENCRYPTION (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_USERNAME" ]; then
            echo "::error::Missing SMTP_USERNAME (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_PASSWORD" ]; then
            echo "::error::Missing SMTP_PASSWORD (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_FROM_EMAIL" ]; then
            echo "::error::Missing SMTP_FROM_EMAIL (GitHub Secret)."
            exit 1
          fi
          if [ -z "$SMTP_FROM_NAME" ]; then
            echo "::error::Missing SMTP_FROM_NAME (GitHub Secret)."
            exit 1
          fi

      - name: Build Expo Web (static export)
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_FEED_MOCK: "0"
          EXPO_PUBLIC_GTM_ID: "GTM-TNHK5MSV"
        run: npx expo export -p web

      - name: Inject GTM into index.html
        run: |
          python - <<'PY'
          from pathlib import Path

          gtm_id = "GTM-TNHK5MSV"
          index_path = Path("dist/index.html")
          html = index_path.read_text(encoding="utf-8")

          head_snippet = f"""<script>(function(w,d,s,l,i){{w[l]=w[l]||[];w[l].push({{'gtm.start':
          new Date().getTime(),event:'gtm.js'}});var f=d.getElementsByTagName(s)[0],
          j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
          'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
          }})(window,document,'script','dataLayer','{gtm_id}');</script>"""
          body_snippet = f"""<noscript><iframe src="https://www.googletagmanager.com/ns.html?id={gtm_id}"
          height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>"""

          if "googletagmanager.com/gtm.js" not in html:
              html = html.replace("</head>", f"{head_snippet}</head>")
          if "googletagmanager.com/ns.html" not in html:
              html = html.replace("<body>", f"<body>{body_snippet}")

          index_path.write_text(html, encoding="utf-8")
          print("GTM snippet injected into dist/index.html")
          PY

      - name: Add SPA fallback (.htaccess)
        run: |
          cat > dist/.htaccess <<'EOF'
          RewriteEngine On
          RewriteBase /
          <IfModule mod_headers.c>
            # Evita cache agressivo do HTML para garantir que novos bundles sejam referenciados.
            <FilesMatch "\.(html)$">
              Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
              Header set Pragma "no-cache"
              Header set Expires "0"
            </FilesMatch>
          </IfModule>
          RewriteRule ^asaas-config\.json$ - [F,L]
          RewriteRule ^ai-audit-config\.json$ - [F,L]
          RewriteRule ^logs/ - [F,L]
          RewriteCond %{REQUEST_FILENAME} -f [OR]
          RewriteCond %{REQUEST_FILENAME} -d
          RewriteRule ^ - [L]
          RewriteRule ^ index.html [L]
          EOF

      - name: Add Hostinger PHP endpoints
        run: |
          mkdir -p dist/imagens
          mkdir -p dist/logs
          cp hostinger/upload-avatar.php dist/upload-avatar.php
          cp hostinger/asaas-create-checkout.php dist/asaas-create-checkout.php
          cp hostinger/asaas-webhook.php dist/asaas-webhook.php
          cp hostinger/ai-feed-audit.php dist/ai-feed-audit.php
          cp hostinger/access-request-notify.php dist/access-request-notify.php
          cp hostinger/access-request-pending-notify.php dist/access-request-pending-notify.php
          cp hostinger/student-mismatch-notify.php dist/student-mismatch-notify.php
          cp hostinger/student-pending-notify.php dist/student-pending-notify.php
          cp hostinger/student-xp-kickoff-notify.php dist/student-xp-kickoff-notify.php
          cat > dist/asaas-config.json <<'EOF'
          {
            "apiKey": "${{ secrets.ASAAS_API_KEY }}",
            "baseUrl": "${{ secrets.ASAAS_BASE_URL }}",
            "webhookToken": "${{ secrets.ASAAS_WEBHOOK_TOKEN }}",
            "enableCheckoutCallback": ${{ secrets.ASAAS_ENABLE_CHECKOUT_CALLBACK }},
            "checkoutSuccessUrl": "${{ secrets.ASAAS_CHECKOUT_SUCCESS_URL }}"
          }
          EOF
          cat > dist/ai-audit-config.json <<'EOF'
          {
            "openAiApiKey": "${{ secrets.OPENAI_API_KEY }}"
          }
          EOF
          cat > dist/smtp-config.json <<'EOF'
          {
            "smtpHost": "${{ secrets.SMTP_HOST }}",
            "smtpPort": ${{ secrets.SMTP_PORT }},
            "smtpEncryption": "${{ secrets.SMTP_ENCRYPTION }}",
            "smtpUsername": "${{ secrets.SMTP_USERNAME }}",
            "smtpPassword": "${{ secrets.SMTP_PASSWORD }}",
            "fromEmail": "${{ secrets.SMTP_FROM_EMAIL }}",
            "fromName": "${{ secrets.SMTP_FROM_NAME }}"
          }
          EOF

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: dist/
          server-dir: /public_html/
          dangerous-clean-slate: false
